name: UI Smoke

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: ui-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-ui-smoke:
    name: iOS UI smoke
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create iOS simulator
        id: ios-simulator
        run: |
          set -euo pipefail
          destination="$(python3 .github/scripts/create-ios-simulator-destination.py)"
          echo "Using $destination"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          xcodebuild test \
            -project docmostly.xcodeproj \
            -scheme docmostlyUITests \
            -destination '${{ steps.ios-simulator.outputs.destination }}' \
            CODE_SIGNING_ALLOWED=NO

  macos-ui-smoke:
    name: macOS UI smoke
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: |
          xcodebuild test \
            -project docmostly.xcodeproj \
            -scheme DocmostlyMacUITests \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
