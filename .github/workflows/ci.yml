name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SwiftLint
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint
        run: swiftlint lint --strict

  crdt-runtime:
    name: CRDT runtime drift
    runs-on: macos-26
    defaults:
      run:
        working-directory: Tools/CRDTRuntime
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tools/CRDTRuntime/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build runtime
        run: npm run build

      - name: Verify generated bundle is committed
        working-directory: .
        run: git diff --exit-code -- docmostly/DocmostlyCRDTRuntime.js

      - name: Audit runtime dependencies
        run: npm audit --audit-level=high

  ios-unit-tests:
    name: iOS unit tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: |
          xcodebuild test \
            -project docmostly.xcodeproj \
            -scheme docmostly \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  ipad-build:
    name: iPad build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project docmostly.xcodeproj \
            -scheme docmostly \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M5),OS=latest' \
            CODE_SIGNING_ALLOWED=NO

  macos-unit-tests:
    name: macOS unit tests
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test
        run: |
          xcodebuild test \
            -project docmostly.xcodeproj \
            -scheme DocmostlyMac \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

  hygiene:
    name: Git hygiene
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check whitespace
        run: git diff --check

      - name: Ensure vendored node_modules are not tracked
        run: |
          tracked_modules="$(git ls-files 'Tools/CRDTRuntime/node_modules/**')"
          if [ -n "$tracked_modules" ]; then
            echo "$tracked_modules"
            exit 1
          fi
